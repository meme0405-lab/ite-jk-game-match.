<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JK Game Match - Meus Matches</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container-main">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-small">
                    <i class="fas fa-gamepad"></i>
                    <span>JK Match</span>
                </div>
                <button class="btn-sidebar-toggle">
                    <i class="fas fa-bars"></i>
                </button>
            </div>

            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <i class="fas fa-home"></i>
                    <span>Dashboard</span>
                </a>
                <a href="jogadores.html" class="nav-item">
                    <i class="fas fa-users"></i>
                    <span>Jogadores</span>
                </a>
                <a href="matches.html" class="nav-item active">
                    <i class="fas fa-heart"></i>
                    <span>Meus Matches</span>
                </a>
                <a href="jogos_favoritos.html" class="nav-item">
                    <i class="fas fa-star"></i>
                    <span>Jogos Favoritos</span>
                </a>
                <a href="perfil.html" class="nav-item">
                    <i class="fas fa-user-circle"></i>
                    <span>Meu Perfil</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <a href="#" class="nav-item">
                    <i class="fas fa-cog"></i>
                    <span>Configurações</span>
                </a>
                <a href="index.html" class="nav-item logout">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Sair</span>
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Navbar -->
            <nav class="navbar">
                <div class="navbar-left">
                    <h2 class="page-title">Meus Matches</h2>
                </div>
            </nav>

            <!-- Tabs -->
            <div class="matches-tabs">
                <button class="tab-btn active" data-tab="pendente">
                    <i class="fas fa-hourglass-half"></i>
                    <span>Pendente</span>
                </button>
                <button class="tab-btn" data-tab="aceito">
                    <i class="fas fa-check-circle"></i>
                    <span>Aceito</span>
                </button>
                <button class="tab-btn" data-tab="finalizado">
                    <i class="fas fa-check-double"></i>
                    <span>Finalizado</span>
                </button>
                <button class="tab-btn" data-tab="recusado">
                    <i class="fas fa-times-circle"></i>
                    <span>Recusado</span>
                </button>
            </div>

            <!-- Matches Content -->
            <div class="matches-content">
                <!-- Pending Matches -->
                <div class="tab-content active" id="tab-pendente">
                    <div class="matches-list" id="matchesPendente">
                        <!-- Carregado dinamicamente -->
                    </div>
                    <div class="empty-state" id="emptyPendente" style="display: none;">
                        <i class="fas fa-heart-broken"></i>
                        <h3>Nenhum match pendente</h3>
                        <p>Vá para <a href="jogadores.html">Jogadores</a> e comece a fazer matches!</p>
                    </div>
                </div>

                <!-- Accepted Matches -->
                <div class="tab-content" id="tab-aceito">
                    <div class="matches-list" id="matchesAceito">
                        <!-- Carregado dinamicamente -->
                    </div>
                    <div class="empty-state" id="emptyAceito" style="display: none;">
                        <i class="fas fa-handshake"></i>
                        <h3>Você ainda não tem matches aceitos</h3>
                    </div>
                </div>

                <!-- Finished Matches -->
                <div class="tab-content" id="tab-finalizado">
                    <div class="matches-list" id="matchesFinalizado">
                        <!-- Carregado dinamicamente -->
                    </div>
                    <div class="empty-state" id="emptyFinalizado" style="display: none;">
                        <i class="fas fa-trophy"></i>
                        <h3>Nenhum match finalizado ainda</h3>
                    </div>
                </div>

                <!-- Declined Matches -->
                <div class="tab-content" id="tab-recusado">
                    <div class="matches-list" id="matchesRecusado">
                        <!-- Carregado dinamicamente -->
                    </div>
                    <div class="empty-state" id="emptyRecusado" style="display: none;">
                        <i class="fas fa-ban"></i>
                        <h3>Nenhum match recusado</h3>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Match Detail Modal -->
    <div class="modal" id="matchModal">
        <div class="modal-content">
            <button class="close-modal">&times;</button>
            <div class="modal-body">
                <div class="match-detail" id="matchDetail">
                    <!-- Carregado dinamicamente -->
                </div>
            </div>
        </div>
    </div>

    <!-- Notificações -->
    <div id="notificationsContainer" style="
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        gap: 10px;
    "></div>

    <script src="js/dados.js"></script>
    <script src="session_user.js.php"></script>
    <script src="js/script.js"></script>
    <script src="js/matches.js"></script>
</body>
</html>
